<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>比赛介绍 · Mock 预览</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #070b12;
            --surface: rgba(7, 11, 18, 0.22);
            --surface-2: rgba(7, 11, 18, 0.15);
            --border: rgba(255, 255, 255, 0.12);
            --gold: #c9a227;
            --gold-light: #e8d48b;
            --text: #f4f4f5;
            --muted: #d1d5db;
            --text-shadow: 0 1px 3px rgba(0,0,0,0.85), 0 2px 12px rgba(0,0,0,0.55);
            --home-accent: #006847;
            --away-accent: #007749;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            color: var(--text);
            background: var(--bg);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Stadium photo backdrop */
        .backdrop {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: #070b12;
            overflow: hidden;
        }
        .stadium-bg {
            position: absolute;
            inset: -5%;
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            opacity: 0;
            transform: scale(1.08);
            transition: opacity 1.2s ease, transform 12s ease-out;
            will-change: opacity, transform;
            filter: saturate(1.1) contrast(1.05);
        }
        .stadium-bg.visible {
            opacity: 1;
            transform: scale(1);
        }
        .backdrop-scrim {
            position: absolute;
            inset: 0;
            background:
                linear-gradient(180deg, rgba(7,11,18,0.35) 0%, rgba(7,11,18,0.02) 50%, rgba(7,11,18,0.25) 100%);
            pointer-events: none;
        }
        .backdrop-vignette {
            position: absolute;
            inset: 0;
            box-shadow: inset 0 0 60px rgba(0,0,0,0.25);
            pointer-events: none;
        }
        .backdrop::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 64px 64px;
            mask-image: radial-gradient(ellipse 80% 60% at 50% 40%, black, transparent);
            pointer-events: none;
            z-index: 1;
        }
        .beam {
            position: absolute;
            top: -10%;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 55%;
            background: linear-gradient(180deg, rgba(201,162,39,0.5), transparent);
            filter: blur(1px);
        }
        .beam::after {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 280px;
            height: 100%;
            background: linear-gradient(180deg, rgba(201,162,39,0.08), transparent);
            clip-path: polygon(48% 0, 52% 0, 100% 100%, 0 100%);
        }

        .page {
            position: relative;
            z-index: 1;
            max-width: 1080px;
            margin: 0 auto;
            padding: 2rem 1.25rem 6rem;
            min-height: 100vh;
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            animation: rise 0.8s ease-out;
        }
        .competition {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: var(--gold-light);
            text-shadow: var(--text-shadow);
        }
        .mock-tag {
            font-size: 0.6rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--muted);
            border: 1px solid var(--border);
            padding: 0.3rem 0.65rem;
            border-radius: 2px;
        }

        /* Venue strip */
        .venue-strip {
            text-align: center;
            margin-bottom: 2.5rem;
            animation: rise 0.8s ease-out 0.1s both;
            padding: 0.5rem 0;
        }
        .venue-strip .stadium {
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            color: #ffffff;
            text-transform: uppercase;
            text-shadow: var(--text-shadow);
        }
        .venue-strip .meta-line {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 0.75rem;
            flex-wrap: wrap;
        }
        .meta-chip {
            font-size: 0.8rem;
            color: #f3f4f6;
            display: flex;
            align-items: center;
            gap: 0.35rem;
            text-shadow: var(--text-shadow);
        }
        .meta-chip strong { color: #ffffff; font-weight: 600; }
        .meta-chip.altitude strong { color: #fcd34d; }
        .kickoff-time {
            margin-top: 1.25rem;
            font-size: clamp(2rem, 6vw, 3rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.9), 0 4px 24px rgba(0,0,0,0.6);
        }
        .stage-label {
            margin-top: 0.5rem;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.18em;
            color: var(--gold-light);
            text-transform: uppercase;
            text-shadow: var(--text-shadow);
        }

        /* Odds strip */
        .odds-strip {
            margin-top: 1.25rem;
            display: inline-flex;
            align-items: stretch;
            gap: 0;
            border: 1px solid rgba(201, 162, 39, 0.35);
            background: rgba(7, 11, 18, 0.55);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 4px;
            overflow: hidden;
            max-width: 100%;
        }
        .odds-cell {
            padding: 0.55rem 1rem;
            text-align: center;
            border-right: 1px solid rgba(255,255,255,0.08);
            min-width: 5.5rem;
        }
        .odds-cell:last-child { border-right: none; }
        .odds-cell .label {
            font-size: 0.58rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 0.2rem;
        }
        .odds-cell .price {
            font-size: 1rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            color: #fff;
        }
        .odds-cell .prob {
            font-size: 0.68rem;
            font-weight: 600;
            color: var(--gold-light);
            margin-top: 0.15rem;
        }
        .odds-cell.home .label { color: #86efac; }
        .odds-cell.draw .price { color: #d1d5db; }
        .odds-updated {
            margin-top: 0.45rem;
            font-size: 0.58rem;
            color: rgba(255,255,255,0.45);
            letter-spacing: 0.06em;
        }

        /* Team betting meta */
        .team-betting {
            padding: 0 1.25rem 0.65rem;
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }
        .side-panel.home .team-betting { align-items: flex-end; text-align: right; }
        .squad-structure, .team-stats, .coach-line, .travel-line, .wcq-style-line, .recent-form {
            font-size: 0.72rem;
            line-height: 1.45;
            color: #e5e7eb;
            text-shadow: 0 1px 4px rgba(0,0,0,0.5);
        }
        .squad-structure .struct-head {
            font-size: 0.68rem;
            margin-bottom: 0.35rem;
        }
        .squad-structure .struct-label {
            color: var(--gold-light);
            font-weight: 700;
        }
        .squad-structure .dim { color: var(--muted); font-weight: 500; }
        .struct-bar {
            display: flex;
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            width: 100%;
            max-width: 220px;
            margin-bottom: 0.35rem;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .side-panel.home .struct-bar { margin-left: auto; }
        .struct-seg.high { background: rgba(201, 162, 39, 0.85); }
        .struct-seg.mid { background: rgba(255, 255, 255, 0.35); }
        .struct-seg.low { background: rgba(96, 165, 250, 0.55); }
        .struct-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 0.35rem 0.65rem;
            font-size: 0.62rem;
            color: var(--muted);
        }
        .side-panel.home .struct-legend { justify-content: flex-end; }
        .struct-legend .dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 1px;
            margin-right: 0.2rem;
            vertical-align: middle;
        }
        .struct-legend .dot.high { background: rgba(201, 162, 39, 0.85); }
        .struct-legend .dot.mid { background: rgba(255, 255, 255, 0.35); }
        .struct-legend .dot.low { background: rgba(96, 165, 250, 0.55); }
        .team-stats .dim, .coach-line .dim, .travel-line .dim, .wcq-style-line .dim { color: var(--muted); font-weight: 500; }
        .wcq-style-line .wcq-muted { color: var(--muted); font-size: 0.68rem; }
        .wcq-style {
            font-weight: 700;
            padding: 0.05rem 0.35rem;
            border-radius: 2px;
            margin-left: 0.2rem;
        }
        .wcq-style.attack { color: #fcd34d; background: rgba(251, 191, 36, 0.15); }
        .wcq-style.defense { color: #93c5fd; background: rgba(59, 130, 246, 0.15); }
        .wcq-style.balanced { color: #d1d5db; background: rgba(255, 255, 255, 0.08); }
        .coach-line .coach-name { color: var(--gold-light); font-weight: 600; }
        .travel-line .travel-label { color: #e5e7eb; font-weight: 500; }
        .travel-line.extreme .travel-label { color: #fcd34d; }
        .form-chips {
            display: inline-flex;
            gap: 0.2rem;
            vertical-align: middle;
        }
        .side-panel.home .form-chips { flex-direction: row-reverse; }
        .form-chip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 1.15rem;
            height: 1.15rem;
            font-size: 0.58rem;
            font-weight: 800;
            border-radius: 2px;
            letter-spacing: 0;
        }
        .form-chip.W { background: rgba(34, 197, 94, 0.25); color: #86efac; }
        .form-chip.D { background: rgba(255,255,255,0.1); color: #d1d5db; }
        .form-chip.L { background: rgba(239, 68, 68, 0.2); color: #fca5a5; }
        .form-goals {
            margin-left: 0.35rem;
            font-size: 0.68rem;
            color: var(--muted);
        }
        .side-panel.home .form-goals { margin-left: 0; margin-right: 0.35rem; }

        /* Pre-match intel */
        .match-intel {
            margin-top: 1.25rem;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(7, 11, 18, 0.35);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            padding: 1rem 1.25rem;
            animation: rise 0.9s ease-out 0.3s both;
        }
        .intel-title {
            font-size: 0.62rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 0.75rem;
        }
        .intel-list { list-style: none; display: flex; flex-direction: column; gap: 0.55rem; }
        .intel-item {
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
            font-size: 0.8rem;
            line-height: 1.45;
            color: var(--text);
        }
        .intel-rank {
            flex-shrink: 0;
            width: 1.1rem;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--muted);
            padding-top: 0.1rem;
        }
        .intel-tag {
            flex-shrink: 0;
            font-size: 0.65rem;
            font-weight: 700;
            padding: 0.15rem 0.4rem;
            border-radius: 3px;
            background: rgba(255,255,255,0.06);
            color: var(--muted);
        }
        .intel-item.impact-high .intel-tag {
            background: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
        }
        .intel-item.impact-medium .intel-tag {
            background: rgba(201, 162, 39, 0.12);
            color: var(--gold-light);
        }
        .intel-link {
            color: inherit;
            text-decoration: underline;
            text-decoration-color: rgba(201, 162, 39, 0.5);
            text-underline-offset: 2px;
        }
        .intel-link:hover { color: var(--gold-light); text-decoration-color: var(--gold-light); }
        .intel-empty { font-size: 0.8rem; color: rgba(255,255,255,0.35); }

        /* Unified match board */
        .match-board {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 0;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: rgba(7, 11, 18, 0.18);
            backdrop-filter: blur(6px) saturate(1.15);
            -webkit-backdrop-filter: blur(6px) saturate(1.15);
            animation: rise 0.9s ease-out 0.2s both;
            overflow: hidden;
        }

        .side-panel {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        .side-panel.home {
            border-top: 3px solid var(--home-accent);
        }
        .side-panel.away {
            border-top: 3px solid var(--away-accent);
        }

        .team-head {
            display: flex;
            align-items: center;
            gap: 0.85rem;
            padding: 1.25rem 1.25rem 0.75rem;
        }
        .side-panel.home .team-head {
            flex-direction: row-reverse;
            text-align: right;
        }

        .flag-wrap {
            width: 56px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(0,0,0,0.12);
            border-radius: 4px;
            overflow: hidden;
            flex-shrink: 0;
        }
        .flag-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.35));
        }
        .pick-star {
            color: var(--gold-light);
            font-size: 0.75rem;
            margin-left: 0.25rem;
            text-shadow: 0 0 6px rgba(201,162,39,0.6);
        }
        .side-panel.home .pick-star { margin-left: 0; margin-right: 0.25rem; }

        .team-info .name {
            font-size: clamp(1.1rem, 3vw, 1.45rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1.1;
            text-shadow: 0 1px 8px rgba(0,0,0,0.6);
        }
        .team-info .owner {
            margin-top: 0.35rem;
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            color: var(--gold-light);
            text-transform: uppercase;
        }
        .team-info .owner::before { content: '归属 · '; opacity: 0.6; }

        .roster-label {
            padding: 0 1.25rem 0.5rem;
            font-size: 0.62rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #e5e7eb;
        }
        .side-panel.home .roster-label { text-align: right; }

        .match-spine {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            padding: 0 1rem;
            border-left: 1px solid rgba(255,255,255,0.08);
            border-right: 1px solid rgba(255,255,255,0.08);
            background: rgba(0,0,0,0.06);
            min-width: 88px;
        }
        .vs-mark {
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.35em;
            color: #e5e7eb;
            text-shadow: var(--text-shadow);
        }
        .score-block {
            font-size: clamp(1.4rem, 4vw, 2rem);
            font-weight: 800;
            letter-spacing: 0.06em;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
            color: #ffffff;
            text-shadow: var(--text-shadow);
        }
        .status-badge {
            font-size: 0.58rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 0.3rem 0.6rem;
            border: 1px solid rgba(255,255,255,0.15);
            color: var(--muted);
            background: rgba(0,0,0,0.15);
            white-space: nowrap;
        }
        .status-badge.live {
            border-color: rgba(239, 68, 68, 0.5);
            color: #f87171;
            background: rgba(239, 68, 68, 0.08);
        }

        .roster {
            padding: 0 0.75rem 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
            flex: 1;
        }
        .roster-row {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.65rem 0.85rem;
            border: 1px solid transparent;
            transition: border-color 0.2s, background 0.2s;
        }
        .player { min-width: 0; flex: 0 1 auto; }
        .side-panel.home .roster-row {
            justify-content: flex-end;
            text-align: right;
        }
        .side-panel.home .roster-row .person { order: 2; }
        .side-panel.home .roster-row .player { order: 1; text-align: right; }
        .side-panel.home .roster-row .player-inner { flex-direction: row-reverse; justify-content: flex-end; }
        .side-panel.away .roster-row {
            justify-content: flex-start;
        }
        .side-panel.away .roster-row .person { order: 2; }
        .side-panel.away .roster-row .player { order: 1; text-align: left; }
        .side-panel.away .roster-row.filled { border-left: none; border-right: 2px solid var(--gold); }
        .side-panel.away .roster-label { text-align: right; }

        .roster-row:hover {
            border-color: rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.04);
        }
        .roster-row.filled { border-left: 2px solid var(--gold); }
        .side-panel.home .roster-row.filled { border-left: none; border-right: 2px solid var(--gold); }
        .player.multi .player-inner + .player-inner { margin-top: 0.35rem; }

        .person {
            flex: 0 0 auto;
            white-space: nowrap;
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            color: #d1d5db;
            text-transform: uppercase;
        }
        .player-inner {
            display: flex;
            align-items: baseline;
        }
        .player-inner .pname {
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text);
            line-height: 1.3;
            text-shadow: 0 1px 6px rgba(0,0,0,0.5);
        }
        .player.empty {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.15);
            font-weight: 300;
        }

        /* Nav */
        .nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 10;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: stretch;
            gap: 0.65rem;
            padding: 0.85rem 1rem;
            background: linear-gradient(to top, rgba(7,11,18,0.98), rgba(7,11,18,0.85));
            border-top: 1px solid var(--border);
        }
        .nav a {
            flex: 1 1 auto;
            min-width: 5.25rem;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            padding: 0.65rem 1rem;
            border: 1px solid var(--border);
            color: var(--muted);
            text-decoration: none;
            text-align: center;
            white-space: nowrap;
            transition: all 0.2s;
            cursor: pointer;
        }
        .nav a:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
        .nav .primary {
            border-color: rgba(201, 162, 39, 0.4);
            color: var(--gold-light);
            background: rgba(201, 162, 39, 0.06);
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 720px) {
            .match-board {
                grid-template-columns: 1fr;
            }
            .match-spine {
                flex-direction: row;
                border-left: none;
                border-right: none;
                border-top: 1px solid var(--border);
                border-bottom: 1px solid var(--border);
                padding: 0.75rem 1rem;
                min-width: unset;
            }
            .side-panel.home .team-head { flex-direction: row; text-align: left; }
            .side-panel.home .roster-label { text-align: left; }
            .side-panel.home .roster-row,
            .side-panel.away .roster-row {
                justify-content: flex-start;
                text-align: left;
            }
            .side-panel.home .roster-row .person,
            .side-panel.away .roster-row .person { order: 0; }
            .side-panel.home .roster-row .player,
            .side-panel.away .roster-row .player { order: 0; text-align: left; }
            .side-panel.home .roster-row .player-inner,
            .side-panel.away .roster-row .player-inner { flex-direction: row; justify-content: flex-start; }
            .side-panel.home .roster-row.filled,
            .side-panel.away .roster-row.filled { border-right: none; border-left: 2px solid var(--gold); }
            .side-panel.away .roster-label { text-align: left; }
            .odds-strip { flex-wrap: wrap; justify-content: center; }
            .odds-cell { min-width: 4.8rem; padding: 0.5rem 0.65rem; }
            .side-panel.home .team-betting { align-items: flex-start; text-align: left; }
            .side-panel.home .form-chips { flex-direction: row; }
            .side-panel.home .form-goals { margin-right: 0; margin-left: 0.35rem; }
            .nav {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 0.55rem;
                padding: 0.75rem 0.85rem calc(0.75rem + env(safe-area-inset-bottom, 0px));
            }
            .nav a {
                min-width: 0;
                padding: 0.6rem 0.45rem;
                font-size: 0.68rem;
            }
        }
    </style>
</head>
<body>

<div class="backdrop">
    <div class="stadium-bg visible" id="stadiumBgA" style="background-image:url('../static/stadiums/azteca.jpg')"></div>

function renderRoster(containerId, data) {
    document.getElementById(containerId).innerHTML = PARTICIPANTS.map(function(name) {
        var raw = data[name];
        var list = !raw ? [] : (Array.isArray(raw) ? raw : [raw]);
        var playerHtml;
        if (!list.length) {
            playerHtml = '<div class="player empty">—</div>';
        } else {
            var multi = list.length > 1 ? ' multi' : '';
            playerHtml = '<div class="player' + multi + '">' + list.map(function(p) {
                var star = p.top20 ? '<span class="pick-star" title="前20顺位选中">★</span>' : '';
                return '<div class="player-inner"><span class="pname">' + p.name + star + '</span></div>';
            }).join('') + '</div>';
        }
        return '<div class="roster-row' + (list.length ? ' filled' : '') + '">' +
            '<div class="person">' + name + '</div>' + playerHtml + '</div>';
    }).join('');
}

function renderOdds(homeName, awayName, odds) {
    var el = document.getElementById('oddsArea');
    if (!odds) {
        el.innerHTML = '<div class="odds-updated">赔率待更新</div>';
        return;
    }
    var p = odds.implied_prob || {};
    el.innerHTML =
        '<div class="odds-strip">' +
            '<div class="odds-cell home"><div class="label">' + homeName + '</div>' +
            '<div class="price">' + odds.home.toFixed(2) + '</div>' +
            '<div class="prob">' + (p.home_pct || '—') + '%</div></div>' +
            '<div class="odds-cell draw"><div class="label">平</div>' +
            '<div class="price">' + odds.draw.toFixed(2) + '</div>' +
            '<div class="prob">' + (p.draw_pct || '—') + '%</div></div>' +
            '<div class="odds-cell away"><div class="label">' + awayName + '</div>' +
            '<div class="price">' + odds.away.toFixed(2) + '</div>' +
            '<div class="prob">' + (p.away_pct || '—') + '%</div></div>' +
        '</div>' +
        '<div class="odds-updated">赔率更新 · ' + (odds.updated_at || '') + ' 北京时间</div>';
}

function renderFormChips(last5) {
    if (!last5) return '';
    return last5.split('').map(function(c) {
        return '<span class="form-chip ' + c + '">' + c + '</span>';
    }).join('');
}

function renderWcqStyle(wcq) {
    if (!wcq) {
        return '<div class="wcq-style-line"><span class="dim">预选赛</span> <span class="wcq-muted">暂无预选赛数据</span></div>';
    }
    if (wcq.host_exempt) {
        return '<div class="wcq-style-line"><span class="dim">预选赛</span> <span class="wcq-muted">' + (wcq.style_label || '主办国免预选赛') + '</span></div>';
    }
    if (!wcq.matches) {
        return '<div class="wcq-style-line"><span class="dim">预选赛</span> <span class="wcq-muted">暂无预选赛数据</span></div>';
    }
    var styleCls = wcq.style || 'balanced';
    return '<div class="wcq-style-line"><span class="dim">预选赛</span> ' +
        '进 ' + wcq.goals_for + ' 失 ' + wcq.goals_against +
        ' · 场均 ' + wcq.gf_per_game + '/' + wcq.ga_per_game +
        ' · <span class="wcq-muted">(' + wcq.matches + '场)</span> ' +
        '<span class="wcq-style ' + styleCls + '">' + (wcq.style_label || '—') + '</span></div>';
}

function renderStructureBar(structure) {
    if (!structure || !structure.high) return '';
    var h = structure.high, m = structure.mid, l = structure.low;
    var tiers = structure.tier_labels || {};
    var legend = [
        { key: 'high', label: tiers.high || '高', seg: h },
        { key: 'mid', label: tiers.mid || '中', seg: m },
        { key: 'low', label: tiers.low || '低', seg: l }
    ];
    return '<div class="squad-structure">' +
        '<div class="struct-head"><span class="dim">球队结构</span> · <span class="struct-label">' + (structure.structure_label || '—') + '</span></div>' +
        '<div class="struct-bar">' +
            '<div class="struct-seg high" style="width:' + h.pct + '%" title="多 ' + h.count + '人"></div>' +
            '<div class="struct-seg mid" style="width:' + m.pct + '%" title="中 ' + m.count + '人"></div>' +
            '<div class="struct-seg low" style="width:' + l.pct + '%" title="少 ' + l.count + '人"></div>' +
        '</div>' +
        '<div class="struct-legend">' + legend.map(function(x) {
            return '<span><span class="dot ' + x.key + '"></span>' + x.label + ' ' + x.seg.count + '·' + Math.round(x.seg.pct) + '%</span>';
        }).join('') + '</div></div>';
}

function formatTravel(travel) {
    if (!travel || !travel.label) return '—';
    var parts = [travel.label];
    if (travel.distance_km > 0) {
        parts.push('约 ' + travel.distance_km.toLocaleString() + 'km');
    }
    if (travel.timezone_delta_h && travel.timezone_delta_h !== 0) {
        var sign = travel.timezone_delta_h > 0 ? '+' : '';
        parts.push('时差 ' + sign + travel.timezone_delta_h + 'h');
    }
    if (travel.cumulative_km != null && travel.cumulative_km > 0) {
        parts.push('累计约 ' + travel.cumulative_km.toLocaleString() + 'km');
    }
    return parts.join(' · ');
}

function renderTeamBetting(containerId, meta, form, travel) {
    var el = document.getElementById(containerId);
    var structure = renderStructureBar(meta.squad_structure);
    var stats = '<div class="team-stats"><span class="dim">平均年龄</span> ' +
        (meta.avg_age != null ? meta.avg_age + ' 岁' : '—') + '</div>';
    var coach = '<div class="coach-line">' +
        '<span class="dim">主教练</span> <span class="coach-name">' + (meta.coach_name_cn || '—') + '</span>' +
        (meta.coach_tenure_years != null ? ' · <span class="dim">执教</span> ' + meta.coach_tenure_years + ' 年' : '') +
        '</div>';
    var travelCls = travel && travel.distance_km >= 10000 ? ' travel-line extreme' : ' travel-line';
    var travelHtml = '<div class="' + travelCls.trim() + '"><span class="dim">旅途</span> <span class="travel-label">' + formatTravel(travel) + '</span></div>';
    var wcqHtml = renderWcqStyle(form.wcq);
    var formHtml = '<div class="recent-form">' +
        '<span class="dim">近5场</span> <span class="form-chips">' + renderFormChips(form.last5) + '</span>' +
        (form.last5 ? '<span class="form-goals">进 ' + form.goals_for + ' 失 ' + form.goals_against + '</span>' : ' <span class="form-goals">暂无近绩</span>') +
        '</div>';
    el.innerHTML = structure + stats + coach + travelHtml + wcqHtml + formHtml;
}

function renderVenueAltitude(venue) {
    var chip = document.getElementById('altitudeChip');
    var text = document.getElementById('altitudeText');
    if (!venue || !venue.altitude_m || venue.altitude_tier === 'normal') {
        chip.style.display = 'none';
        return;
    }
    var label = venue.altitude_label ? ' · ' + venue.altitude_label : '';
    text.textContent = '海拔 ' + venue.altitude_m.toLocaleString() + 'm' + label;
    chip.style.display = '';
}

function renderIntel(news) {
    var el = document.getElementById('matchIntel');
    if (!news || !news.length) {
        el.innerHTML = '<div class="intel-title">赛前关键动态</div><p class="intel-empty">暂无重要赛前动态</p>';
        return;
    }
    el.innerHTML = '<div class="intel-title">赛前关键动态</div><ul class="intel-list">' +
        news.map(function(n) {
            var impact = n.impact === 'high' ? 'impact-high' : (n.impact === 'medium' ? 'impact-medium' : '');
            var title = n.url
                ? '<a class="intel-link" href="' + n.url + '" target="_blank" rel="noopener noreferrer">' + n.headline + '</a>'
                : '<span>' + n.headline + '</span>';
            return '<li class="intel-item ' + impact + '">' +
                '<span class="intel-rank">' + n.rank + '</span>' +
                '<span class="intel-tag">' + n.category_label + '·' + n.team + '</span>' +
                title + '</li>';
        }).join('') + '</ul>';
}

};

var bgToggle = false;
var currentStadiumKey = null;

function setStadiumBackground(key) {
    var info = STADIUM_PHOTOS[key];
    if (!info || key === currentStadiumKey) return;
    currentStadiumKey = key;
    var layerA = document.getElementById('stadiumBgA');
    var layerB = document.getElementById('stadiumBgB');
    var target = bgToggle ? layerB : layerA;
    var other = bgToggle ? layerA : layerB;
    target.style.backgroundImage = 'url("' + info.url + '")';
    target.style.backgroundPosition = info.position;
    target.classList.add('visible');
    other.classList.remove('visible');
    bgToggle = !bgToggle;
}

function initMatch() {
    var d = MATCH;
    setStadiumBackground(d.stadiumKey);
    document.getElementById('stadiumName').textContent = d.stadium;
    document.getElementById('weatherText').textContent = d.weather;
    document.getElementById('tempText').textContent = d.temp;
    document.getElementById('kickoffText').textContent = d.kickoff;
    document.getElementById('metaText').textContent = d.meta;

    ['home', 'away'].forEach(function(s) {
        document.getElementById(s + 'Flag').src = '../static/flags/' + d[s + 'Flag'] + '.png';
        document.getElementById(s + 'Name').textContent = d[s + 'Name'];
        document.getElementById(s + 'Owner').textContent = d[s + 'Owner'];
    });

    var pill = document.getElementById('statusPill');
    pill.textContent = d.status;
    pill.className = 'status-badge' + (d.statusClass ? ' ' + d.statusClass : '');
    pill.style.display = d.score ? 'none' : 'block';

    var score = document.getElementById('scoreDisplay');
    score.style.display = d.score ? 'block' : 'none';
    if (d.score) score.textContent = d.score;
}
